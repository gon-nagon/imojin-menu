<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg: #EFE9DC;
    --bg-soft: #F6F1E6;
    --surface: #FBF8F1;
    --surface-alt: #F1E9D6;
    --ink: #2B2621;
    --ink-soft: #5C544A;
    --indigo: #223A5E;
    --indigo-soft: #3C5476;
    --azuki: #7B3B3B;
    --azuki-soft: #9B5B54;
    --gold: #A9822F;
    --gold-soft: #C9A65C;
    --line: #D9CDB2;
    --radius: 14px;
    --maxw: 720px;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.5), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(0,0,0,0.03), transparent 45%);
    color: var(--ink);
    font-family: "Zen Maru Gothic", "Noto Sans JP", "Noto Sans SC", "Noto Sans KR", sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    word-break: keep-all;       /* CJK: avoid mid-word line breaks */
    overflow-wrap: break-word;  /* still wrap if a single word is too long */
  }
  h1,h2,h3{ font-family: "Shippori Mincho", "Noto Serif JP", serif; margin:0; }

  /* ---- top bar ---- */
  .topbar{
    position: sticky; top:0; z-index: 40;
    background: rgba(251,248,241,0.92);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner{
    max-width: var(--maxw); margin:0 auto;
    display:flex; align-items:center; justify-content: space-between;
    padding: 10px 16px;
    gap: 10px;
  }
  .brandmark{ display:flex; align-items:center; gap:8px; }
  .brandmark svg{ width:26px; height:26px; flex-shrink:0; }
  .brandmark span{ font-family:"Shippori Mincho", serif; font-size: 1.05rem; font-weight:700; color:var(--indigo); letter-spacing:.04em; white-space:nowrap; }
  .langs{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .lang-btn{
    border:1px solid var(--line);
    background: var(--surface);
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 0.78rem;
    padding: 7px 11px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s ease;
    white-space:nowrap;
  }
  .lang-btn:hover{ background: var(--surface-alt); }
  .lang-btn.active{
    background: var(--indigo);
    border-color: var(--indigo);
    color: #fff;
    font-weight:700;
  }

  /* ---- hero ---- */
  .hero{
    max-width: var(--maxw); margin: 0 auto;
    padding: 34px 20px 20px;
    text-align:center;
  }
  .hero .ensou{ width:54px; height:54px; margin:0 auto 10px; display:block; opacity:.85; }
  .hero h1{ font-size: 2.1rem; color: var(--ink); letter-spacing:.06em; }
  .hero p{ margin-top:6px; color: var(--ink-soft); font-size: 0.95rem; letter-spacing:.08em; }

  /* ---- category nav ---- */
  .catnav-wrap{
    position: sticky; top: 49px; z-index: 30;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--line);
  }
  .catnav-wrap::after{
    content:"";
    position:absolute; top:0; right:0; bottom:0; width:32px;
    background: linear-gradient(to right, transparent, var(--bg-soft) 75%);
    pointer-events:none;
  }
  .catnav{
    max-width: var(--maxw); margin:0 auto;
    display:flex; gap:8px; overflow-x:auto;
    padding: 10px 20px 10px 16px;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .catnav::-webkit-scrollbar{ display:none; }
  .catnav a{
    flex-shrink:0;
    font-size: 0.82rem;
    text-decoration:none;
    color: var(--indigo);
    background: var(--surface);
    border:1px solid var(--line);
    padding: 7px 13px;
    border-radius: 999px;
    white-space:nowrap;
    font-weight:500;
  }

  /* ---- main ---- */
  main{ max-width: var(--maxw); margin: 0 auto; padding: 8px 16px 60px; }

  .section{ padding-top: 40px; scroll-margin-top: 100px; }
  .section-head{
    display:flex; align-items:center; gap:10px; margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .section-head svg.mark{ width:30px; height:30px; flex-shrink:0; }
  .section-head h2{ font-size: 1.35rem; letter-spacing: .04em; }
  .badge{
    display:inline-flex; align-items:center; gap:4px;
    font-size: 0.7rem; font-weight:700;
    padding: 4px 10px; border-radius: 999px;
    letter-spacing:.03em;
    white-space: nowrap;
  }
  .badge.seasonal{ background: var(--gold); color:#fff; }
  .badge.popular{ background: var(--azuki); color:#fff; }

  /* featured cards */
  .featured-grid{
    display:grid; grid-template-columns: 1fr; gap: 14px;
    margin-bottom: 18px;
  }
  .sub-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .feature-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow:hidden;
    position:relative;
  }
  .feature-card.main{ box-shadow: 0 3px 14px rgba(43,38,33,0.08); }
  .photo-slot{
    aspect-ratio: 4 / 3;
    background:
      repeating-linear-gradient(135deg, rgba(43,38,33,0.03) 0 10px, transparent 10px 20px),
      var(--surface-alt);
    border-bottom: 1px dashed var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color: var(--ink-soft);
    gap:6px;
  }
  .sub-row .photo-slot{ aspect-ratio: 1 / 1; }
  .photo-slot svg{ width:30px; height:30px; opacity:.55; }
  .sub-row .photo-slot svg{ width:22px; height:22px; }
  .photo-slot span{ font-size: 0.72rem; letter-spacing:.03em; white-space:nowrap; }
  .sub-row .photo-slot span{ font-size: 0.65rem; }

  .feature-body{ padding: 14px 16px 16px; }
  .sub-row .feature-body{ padding: 10px 12px 12px; }
  .feature-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .feature-name{ font-family:"Shippori Mincho", serif; font-size: 1.15rem; font-weight:700; }
  .sub-row .feature-name{ font-size: 0.95rem; }
  .feature-sub{ font-size: 0.78rem; color: var(--ink-soft); margin-top:2px; }
  .feature-price{ font-weight:700; color: var(--indigo); white-space:nowrap; font-size: 1.05rem; }
  .sub-row .feature-price{ font-size: 0.92rem; }
  .feature-note{ font-size: 0.78rem; color: var(--ink-soft); margin-top: 6px; }

  /* list rows */
  .list{ border-top: 1px solid var(--line); }
  .list-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap: 12px;
    padding: 12px 2px;
    border-bottom: 1px solid var(--line);
  }
  .list-row .name{ font-weight:700; font-size: 0.98rem; }
  .list-row .sub{ font-size: 0.78rem; color: var(--ink-soft); margin-top: 2px; }
  .list-row .note{ font-size: 0.75rem; color: var(--ink-soft); margin-top: 2px; }
  .list-row .price{ font-weight:700; color: var(--indigo); white-space:nowrap; padding-top:2px; }
  .category-note{ font-size: 0.75rem; color: var(--ink-soft); margin: 10px 2px 0; }

  /* takeout section */
  .takeout{
    margin-top: 44px;
    background: var(--surface-alt);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 18px 8px;
  }
  .takeout .section-head{ margin-bottom: 8px; }
  .takeout-note{ font-size: 0.8rem; color: var(--ink-soft); margin: -8px 0 14px; }
  .takeout .list{ border-top: 1px solid var(--line); }

  footer{
    max-width: var(--maxw); margin: 40px auto 0; padding: 18px 20px 40px;
    text-align:center; color: var(--ink-soft); font-size: 0.75rem; line-height:1.9;
  }

  @media (max-width: 420px){
    .hero h1{ font-size: 1.7rem; }
    .sub-row{ gap: 8px; }
  }
</style>
</head>

/* =========================================================
   RENDER
   ========================================================= */
let currentLang = "ja";

const svgCamera = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="14" r="3.4"/></svg>`;
const svgMarkIce = `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="var(--indigo-soft)" stroke-width="2" stroke-dasharray="88 14" stroke-linecap="round" transform="rotate(30 20 20)"/></svg>`;
const svgMarkGold = `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="var(--gold)" stroke-width="2" stroke-dasharray="88 14" stroke-linecap="round" transform="rotate(-70 20 20)"/></svg>`;

function priceStr(n){
  const u = UI[currentLang];
  if(currentLang==="ja") return n.toLocaleString("ja-JP") + u.yen;
  if(currentLang==="zh") return "¥" + n.toLocaleString();
  if(currentLang==="ko") return n.toLocaleString() + u.yen;
  return "¥" + n.toLocaleString();
}

function photoSlot(){
  const u = UI[currentLang];
  return `<div class="photo-slot">${svgCamera}<span>${u.photoSoon}</span></div>`;
}

function renderLangSwitch(){
  const wrap = document.getElementById("langSwitch");
  wrap.innerHTML = "";
  Object.keys(UI).forEach(code=>{
    const b = document.createElement("button");
    b.className = "lang-btn" + (code===currentLang ? " active":"");
    b.textContent = UI[code].langName;
    b.onclick = ()=>{ currentLang = code; renderAll(); };
    wrap.appendChild(b);
  });
}

function renderCatNav(){
  const nav = document.getElementById("catNav");
  nav.innerHTML = "";
  CATEGORIES.forEach(cat=>{
    const a = document.createElement("a");
    a.href = "#" + cat.id;
    a.textContent = cat.title[currentLang];
    nav.appendChild(a);
  });
  const a = document.createElement("a");
  a.href = "#takeout";
  a.textContent = TAKEOUT.title[currentLang];
  nav.appendChild(a);
}

function featureCard(item, isSub){
  const u = UI[currentLang];
  const name = item[currentLang] || item.ja;
  const note = item.note ? (item.note[currentLang] || "") : "";
  const priceLabel = (item.plus ? "+" : "") + priceStr(item.price);
  return `
    <div class="feature-card ${isSub? "sub":"main"}">
      ${photoSlot()}
      <div class="feature-body">
        <div class="feature-top">
          <div>
            <div class="feature-name">${name}</div>
            ${note ? `<div class="feature-sub">${note}</div>` : ""}
          </div>
          <div class="feature-price">${priceLabel}</div>
        </div>
        ${item.tag==="popular" ? `<div class="feature-note"><span class="badge popular">★ ${u.popular}</span></div>` : ""}
      </div>
    </div>`;
}

function listRow(item){
  const name = item[currentLang] || item.ja;
  const note = item.note ? (item.note[currentLang] || "") : "";
  const priceLabel = (item.plus ? "+" : "") + priceStr(item.price);
  return `
    <div class="list-row">
      <div>
        <div class="name">${name}</div>
        ${note ? `<div class="note">${note}</div>` : ""}
      </div>
      <div class="price">${priceLabel}</div>
    </div>`;
}

function renderCategory(cat){
  const u = UI[currentLang];
  const mainFeatured = cat.items.filter(i=>i.photo==="main");
  const subFeatured = cat.items.filter(i=>i.photo==="sub");

  let featuredHtml = "";
  if(mainFeatured.length || subFeatured.length){
    featuredHtml += `<div class="featured-grid">`;
    mainFeatured.forEach(f=>{ featuredHtml += featureCard(f, false); });
    if(subFeatured.length){
      featuredHtml += `<div class="sub-row">`;
      subFeatured.forEach(f=>{ featuredHtml += featureCard(f, true); });
      featuredHtml += `</div>`;
    }
    featuredHtml += `</div>`;
  }

  const listHtml = `<div class="list">${cat.items.map(listRow).join("")}</div>`;
  const categoryNote = cat.id === "kakigori" ? `<p class="category-note">${u.kakigoriNote}</p>` : "";

  return `
    <section class="section" id="${cat.id}">
      <div class="section-head">
        <span class="mark" style="width:30px;display:inline-flex">${svgMarkIce}</span>
        <h2>${cat.title[currentLang]}</h2>
        ${cat.seasonal ? `<span class="badge seasonal">${u.seasonal}</span>` : ""}
      </div>
      ${featuredHtml}
      ${listHtml}
      ${categoryNote}
    </section>`;
}

function renderTakeout(){
  const u = UI[currentLang];
  return `
    <section class="takeout" id="takeout">
      <div class="section-head">
        <span class="mark" style="width:30px;display:inline-flex">${svgMarkGold}</span>
        <h2>${TAKEOUT.title[currentLang]}</h2>
      </div>
      <p class="takeout-note">${u.takeoutNote}</p>
      <div class="list">${TAKEOUT.items.map(listRow).join("")}</div>
    </section>`;
}

function renderAll(){
  const u = UI[currentLang];
  document.documentElement.lang = currentLang;
  document.getElementById("brandText").textContent = u.brand;
  document.getElementById("heroTitle").textContent = u.heroTitle;
  document.getElementById("heroSubtitle").textContent = u.heroSub;
  document.getElementById("footer").textContent = u.footer;

  renderLangSwitch();
  renderCatNav();

  const main = document.getElementById("main");
  main.innerHTML = CATEGORIES.map(renderCategory).join("") + renderTakeout();
}

renderAll();
</script>
